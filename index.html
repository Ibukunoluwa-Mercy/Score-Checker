<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>


    <div class="card">

        <h2>Grade System</h2>
        <p>Check for your grade</p>
        <div class="button-card">
            <input type="text" placeholder="Enter your score" id="scoreInput">
            <button onclick="checkGrade()">Check</button>
        </div>

        <div class="result">
            <input type="text" placeholder="see your grade" id="resultOutput" readonly>
        </div>

    </div>
    <audio id="successSound" src="SOUNDS/Video Project.m4a" preload="auto"></audio>
    <audio id="soundSuccess" src="SOUNDS/excellent.mp3" preload="auto"></audio>
    <audio id="veryGood" src="SOUNDS/very-good.mp3" preload="auto"></audio>


    <section class="card">
<h2>Check your result</h2>
<div class="button-card">
    <input type="number" id="inputResult" placeholder="Enter score">
<button onclick="checkResult()">Submit</button>
</div>

        <div class="result">
            <input type="text" placeholder="see your grade" id="areaDisplay" readonly>
        </div>
    </section>

    <section class="card">
<h2>Input your Post UTME Score</h2>
<div class="button-card">
    <input type="number" id="inputUtme" placeholder="Enter post UTME score">
<button onclick="postUtme()">Submit</button>
</div>

<div>
    <p id="utmePost"></p>
</div>
    </section>
</body>
<script src="script.js"></script>

</html>
